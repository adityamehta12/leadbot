<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — LeadBot</title>
    <link rel="stylesheet" href="/static/dashboard/styles.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>Create Your Account</h1>
        <p class="login-subtitle">Start capturing leads in minutes</p>
        <div id="error-msg" class="error-msg" style="display:none"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="business_name">Business Name</label>
                <input type="text" id="business_name" name="business_name" required placeholder="Sparkle Cleaning Co.">
            </div>
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required placeholder="Jane Smith">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="jane@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8" placeholder="At least 8 characters">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p style="text-align:center;margin-top:16px;font-size:14px;color:#64748b;">
            Already have an account? <a href="/login" style="color:#2563eb;text-decoration:none;font-weight:500;">Sign in</a>
        </p>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        business_name: document.getElementById('business_name').value,
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                    }),
                });
                if (!res.ok) {
                    const data = await res.json();
                    errEl.textContent = data.detail || 'Registration failed';
                    errEl.style.display = 'block';
                    return;
                }
                window.location.href = '/dashboard';
            } catch (err) {
                errEl.textContent = 'Connection error';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
