<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — LeadBot</title>
    <link rel="stylesheet" href="/static/dashboard/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">LeadBot</div>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Leads</a>
            <a href="/dashboard/webhooks" class="nav-link">Webhooks</a>
            <a href="/dashboard/settings" class="nav-link">Settings</a>
            <form action="/api/auth/logout" method="post" style="display:inline">
                <button type="submit" class="nav-link btn-link">Logout</button>
            </form>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
