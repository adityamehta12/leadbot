<!DOCTYPE html>
<html>
<head>
<style>
  .wrapper * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
  .input-area { padding: 12px 16px; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: flex-end; background: #fff; width: 380px; }
  .input-area textarea { flex: 1; border: 1px solid #e2e8f0; border-radius: 18px; padding: 10px 16px !important; font-size: 14px; outline: none; resize: none; overflow: hidden; height: 40px; line-height: 1.4; font-family: sans-serif; display: block; box-sizing: border-box !important; }
  button { width: 40px; height: 40px; border-radius: 50%; border: none; background: blue; flex-shrink: 0; }
</style>
</head>
<body>
<h3>Type or paste a long message here:</h3>
<div class="wrapper">
  <div class="input-area">
    <textarea id="t" rows="1" placeholder="Type..."></textarea>
    <button>S</button>
  </div>
</div>
<pre id="debug"></pre>
<script>
const t = document.getElementById("t");
const d = document.getElementById("debug");
function resize() {
  t.style.height = "0";
  const sh = t.scrollHeight;
  const h = Math.max(40, Math.min(sh, 120));
  t.style.height = h + "px";
  t.style.overflow = h >= 120 ? "auto" : "hidden";
  d.textContent = `scrollHeight=${sh} finalHeight=${h} clientHeight=${t.clientHeight} value.length=${t.value.length}`;
}
t.addEventListener("input", resize);

// Simulate speech recognition setting value
setInterval(() => {
  if (t.value.length > 0) resize();
}, 200);
</script>
</body>
</html>
